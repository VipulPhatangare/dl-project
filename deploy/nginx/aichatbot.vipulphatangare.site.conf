server {
    listen 80;
    server_name aichatbot.vipulphatangare.site;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name aichatbot.vipulphatangare.site;

    # Certbot will manage these files after certificate issuance.
    ssl_certificate /etc/letsencrypt/live/aichatbot.vipulphatangare.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aichatbot.vipulphatangare.site/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/aichatbot/client/dist;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:6161/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 60s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }
}
